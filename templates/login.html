{% extends "base.html" %}
{% block title %}Login — SecureAuth{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔑</div>
            <h1>Sign In</h1>
            <p>Welcome back to SecureAuth</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" novalidate>
            <div class="form-group">
                <label for="identifier">Username or Email</label>
                <input
                    type="text"
                    id="identifier"
                    name="identifier"
                    class="form-control"
                    value="{{ identifier or '' }}"
                    placeholder="Enter username or email"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Your password"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </div>

        <div class="security-badge">
            <span>🛡</span> Protected against SQL injection · Sessions invalidated on logout
        </div>
    </div>
</div>
{% endblock %}
